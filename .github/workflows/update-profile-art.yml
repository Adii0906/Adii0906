name: Update profile art

# Re-scrapes the public contribution calendar and re-renders the heatmap SVG
# every day. No token, no auth -- fetch_contributions.py reads the same public
# HTML the profile page serves. Also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "17 3 * * *"   # daily at 03:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-profile-art
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: Adii0906
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          if git diff --staged --quiet; then
            echo "No contribution changes today."
          else
            git commit -m "chore: refresh contribution graph [skip ci]"
            git push
          fi
